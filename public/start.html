<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=./" />
    <title>启动考试 AI 题库</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f8fb;
        color: #172033;
        font-family:
          "Microsoft YaHei",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid #d8e2ef;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(30, 42, 62, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.35;
      }

      p {
        margin: 0 0 20px;
        color: #536174;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 18px;
        border-radius: 6px;
        background: #1456d9;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
    <script>
      const target = new URL("./", window.location.href);
      target.searchParams.set("from", "github-start");
      window.location.replace(target.href);
    </script>
  </head>
  <body>
    <main>
      <h1>正在启动考试 AI 题库</h1>
      <p>如果浏览器没有自动跳转，请点击下面的按钮进入题库目录。</p>
      <a href="./?from=github-start">进入题库</a>
    </main>
  </body>
</html>
