<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f8f69" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="考试 AI 题库" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/kaoshitiku/manifest.webmanifest" />
    <link rel="icon" href="/kaoshitiku/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/kaoshitiku/icon.svg" />
    <title>考试 AI 题库与错题教练</title>
    <style>
      html.file-mode,
      html.file-mode body {
        min-height: 100%;
        margin: 0;
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
        background: #f6faf9;
        color: #17201d;
      }

      .file-fallback {
        display: none;
      }

      html.file-mode #root,
      html.file-mode script[type="module"] {
        display: none;
      }

      html.file-mode .file-fallback {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .fallback-card {
        width: min(720px, 100%);
        padding: 28px;
        background: #ffffff;
        border: 1px solid #d9e4e0;
        border-radius: 8px;
        box-shadow: 0 18px 40px rgba(23, 32, 29, 0.08);
      }

      .fallback-card h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .fallback-card p {
        margin: 8px 0;
        line-height: 1.7;
      }

      .fallback-card a {
        display: inline-flex;
        margin-top: 16px;
        padding: 11px 16px;
        color: #ffffff;
        background: #0f8f69;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
      }

      .fallback-card code {
        padding: 2px 6px;
        background: #eaf7f2;
        border-radius: 5px;
      }
    </style>
    <script>
      if (window.location.protocol === "file:") {
        document.documentElement.classList.add("file-mode");
      }
    </script>
    <script type="module" crossorigin src="/kaoshitiku/assets/index-GDWsO2NC.js"></script>
    <link rel="stylesheet" crossorigin href="/kaoshitiku/assets/index-DqkV22vb.css">
  </head>
  <body>
    <div class="file-fallback">
      <div class="fallback-card">
        <h1>考试 AI 题库与错题教练</h1>
        <p>
          你现在是直接打开源码 <code>index.html</code>。这个文件需要通过本地开发服务运行，直接双击会导致应用脚本无法加载。
        </p>
        <p>
          电脑端地址：<code>http://127.0.0.1:4173</code>
        </p>
        <p>
          如果服务没启动，请双击项目里的 <code>启动电脑端.bat</code>，或在当前目录运行
          <code>npm run dev</code>。
        </p>
        <a href="http://127.0.0.1:4173">打开电脑端</a>
      </div>
    </div>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/kaoshitiku/service-worker.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
